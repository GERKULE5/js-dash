<svg xmlns="http://www.w3.org/2000/svg" width="30" height="36" viewBox="0 0 30 36">
  <defs>
    <linearGradient id="spikeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff6680"/>
      <stop offset="100%" stop-color="#cc0022"/>
    </linearGradient>
    <filter id="spikeGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Spike triangle: base at bottom (y=36), tip at top (y=0) -->
  <polygon points="0,36 15,0 30,36" fill="url(#spikeGrad)" stroke="#ff0033" stroke-width="1.5" filter="url(#spikeGlow)" stroke-linejoin="round"/>
  <!-- Inner shine line -->
  <line x1="15" y1="4" x2="8" y2="32" stroke="rgba(255,180,180,0.35)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
