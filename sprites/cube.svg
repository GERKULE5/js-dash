<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Main body -->
  <rect x="1" y="1" width="38" height="38" rx="5" ry="5" fill="url(#cubeGrad)" stroke="#00ddff" stroke-width="2" filter="url(#glow)"/>
  <!-- Shine highlight -->
  <rect x="4" y="4" width="14" height="12" rx="3" ry="3" fill="rgba(255,255,255,0.22)"/>
  <!-- Eye white -->
  <rect x="8" y="8" width="10" height="10" rx="1" fill="white"/>
  <!-- Eye pupil -->
  <rect x="11" y="11" width="5" height="5" fill="#003399"/>
  <!-- Decorative lines -->
  <line x1="1" y1="20" x2="39" y2="20" stroke="rgba(0,245,255,0.25)" stroke-width="1"/>
  <line x1="20" y1="1" x2="20" y2="39" stroke="rgba(0,245,255,0.15)" stroke-width="1"/>
  <!-- Corner accents -->
  <rect x="1" y="1" width="6" height="2" rx="1" fill="#00f5ff" opacity="0.7"/>
  <rect x="1" y="1" width="2" height="6" rx="1" fill="#00f5ff" opacity="0.7"/>
  <rect x="33" y="1" width="6" height="2" rx="1" fill="#00f5ff" opacity="0.7"/>
  <rect x="37" y="1" width="2" height="6" rx="1" fill="#00f5ff" opacity="0.7"/>
</svg>
